<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        fieldset {
            border: 2px dashed #000;
            padding: 12px;
        }

        .fila-botones {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            flex-wrap: nowrap;
        }
    </style>
</head>
<body>      
    <header><h1>Formulario con controles clásicos</h1></header> <!-- Título del encabezado -->
    <form>
        <fieldset>
            <legend>Cajas de texto</legend>

            <label for="name">Campo de texto:</label> <!-- Etiqueta para el campo de nombre -->
            <input type="text" id="campo" name="campo"><br><br> <!-- Campo de texto para el nombre -->

            <label for="message">Texto multilínea:</label> <!-- Etiqueta para el campo de texto multilínea -->
            <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br> <!-- Campo de texto multilínea -->

            <label for="password">Contraseña:</label> <!-- Etiqueta para el campo de contraseña -->
            <input type="password" id="password" name="password"><br><br> <!-- Campo de contraseña -->

        </fieldset>
    </form>

    <form>
        <fieldset>
            <legend>Controles de selección</legend>

            <label for="combo">Lista de selección simple (tipo combo):</label>
            <select id="combo" name="combo">
                <option value="opcion1">Perro</option>
                <option value="opcion2">Gato</option>
                <option value="opcion3">Ratón</option>
            </select>

            <label for="listaSimple">Lista de selección simple:</label>
            <select id="listaSimple" name="listaSimple" size="3">
                <option value="respuesta1">Perro</option>
                <option value="respuesta2">Gato</option>
                <option value="respuesta3">Roedor</option>
            </select>
            </div><br><br>

            <label for="listaMultiple">Lista de selección múltiple (Ctrl + clic):</label>
            <select id="listaMultiple" name="listaMultiple" size="3" multiple>
                <option value="multi1">Roedor</option>
                <option value="multi2">Lobo</option>
                <option value="multi3">León</option>
            </select><br><br>

            <span>3. Lista de botones radio</span>
            <input type="radio" id="radio1" name="opcionRadio" value="radio1">
            <label for="radio1">Perro</label>
            <input type="radio" id="radio2" name="opcionRadio" value="radio2">
            <label for="radio2">Gato</label>
            <input type="radio" id="radio3" name="opcionRadio" value="radio3">
            <label for="radio3">Ratón</label><br><br>

            <span>4. Lista de cajas (checkbox)</span>
            <input type="checkbox" id="check1" name="checks" value="check1">
            <label for="check1">Chico</label>
            <input type="checkbox" id="check2" name="checks" value="check2">
            <label for="check2">Mediano</label>
            <input type="checkbox" id="check3" name="checks" value="check3">
            <label for="check3">Grande</label><br><br>
        </fieldset>
    </form>

    <form>
        <fieldset>
            <legend>Botones</legend>

            <div class="fila-botones">
                <input type="submit" value="Enviar información">
                <input type="reset" value="Borrar información">
                <input type="button" value="Botón">
            </div>
        </fieldset>
    </form>
</body>
</html>
