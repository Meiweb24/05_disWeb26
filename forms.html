<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header><h1>Formulario con controles clásicos</h1></header> <!-- Título del encabezado -->
    <form>
        <fieldset>
            <legend>Cajas de texto</legend>

            <label for="name">Campo de texto:</label> <!-- Etiqueta para el campo de nombre -->
            <input type="text" id="name" name="name"><br><br> <!-- Campo de texto para el nombre -->

            <label for="message">Texto multilínea:</label> <!-- Etiqueta para el campo de texto multilínea -->
            <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br> <!-- Campo de texto multilínea -->

            <label for="password">Contraseña:</label> <!-- Etiqueta para el campo de contraseña -->
            <input type="password" id="password" name="password"><br><br> <!-- Campo de contraseña -->

            <input type="submit" value="Enviar"> <!-- Botón de envío del formulario -->
        </fieldset>
    </form>
</body>
</html>
